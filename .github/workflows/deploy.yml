name: Deploy Capstone Game Server

on:
  workflow_dispatch:

  push:
    branches: [ "main" ]
    paths:
      - 'Client/Builds/LinuxServer/**'
      - 'Client/Dockerfile'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Client

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: capstone-crunch
          IMAGE_TAG: latest
        run: |
          docker build -t capstone-server .
          docker tag capstone-server:latest $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            aws ecr get-login-password --region ap-northeast-2 | sudo docker login --username AWS --password-stdin 681986853643.dkr.ecr.ap-northeast-2.amazonaws.com
            sudo docker rm -f capstone-crunch || true
            sudo docker pull 681986853643.dkr.ecr.ap-northeast-2.amazonaws.com/capstone-crunch:latest
            sudo docker run -d -p 7777:7777/udp --name capstone-crunch \
              --log-driver=awslogs \
              --log-opt awslogs-region=ap-northeast-2 \
              --log-opt awslogs-group=capstone-crunch-server-log \
              --log-opt awslogs-stream=server-log-$(date +%Y-%m-%d) \
              681986853643.dkr.ecr.ap-northeast-2.amazonaws.com/capstone-crunch:latest
            sudo docker image prune -f